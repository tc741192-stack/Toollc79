<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI ROBOT - ZUKA EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #dfbd69;
            --tai: #00ffcc;
            --xiu: #ff0055;
            --bg: rgba(10, 10, 10, 0.96);
            --green: #2ecc71;
            --red: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }

        /* GAME FULL MÀN HÌNH - KHÔNG HEADER */
        .game-container { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 1; 
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* TOOL ROBOT */
        .tool-wrapper {
            position: fixed; top: 35%; left: 15px; z-index: 9999;
            display: flex; align-items: center; gap: 10px; cursor: grab; touch-action: none;
        }

        .robot-img {
            width: 65px; height: 65px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            animation: float 3s ease-in-out infinite;
        }

        .info-rect {
            background: var(--bg); border: 1px solid rgba(223,189,105,0.4);
            border-radius: 12px; padding: 12px 18px; min-width: 195px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            position: relative;
        }

        .led-status { position: absolute; top: 12px; right: 12px; width: 7px; height: 7px; border-radius: 50%; background: #444; }
        .p-label { font-size: 8px; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; opacity: 0.8; }
        #phien_id { color: #fff; font-size: 13px; font-weight: 800; display: block; }
        .result-display { font-size: 22px; font-weight: 800; color: #fff; margin-top: 4px; letter-spacing: 1px; }
        
        #confidence { font-size: 10px; color: #aaa; margin-top: 6px; display: block; font-weight: 600; }

        /* Hiệu ứng chế độ kết quả */
        .mode-tai { border-color: var(--tai); box-shadow: 0 0 25px rgba(0,255,204,0.25); }
        .mode-tai .result-display { color: var(--tai); text-shadow: 0 0 12px var(--tai); }
        .mode-tai .led-status { background: var(--tai); box-shadow: 0 0 10px var(--tai); animation: blink 0.7s infinite; }

        .mode-xiu { border-color: var(--xiu); box-shadow: 0 0 25px rgba(255,0,85,0.25); }
        .mode-xiu .result-display { color: var(--xiu); text-shadow: 0 0 12px var(--xiu); }
        .mode-xiu .led-status { background: var(--xiu); box-shadow: 0 0 10px var(--xiu); animation: blink 0.7s infinite; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="game-container">
    <iframe src="https://lc79b.bet/"></iframe>
</div>

<div class="tool-wrapper" id="moveTool">
    <img src="https://i.postimg.cc/rwkZQhxp/Robot.gif" class="robot-img">
    <div class="info-rect" id="mainRect">
        <div class="led-status"></div>
        <div class="p-label">ZUKA HYPERION AI</div>
        <div id="phien_id">Phiên: Đang tải...</div>
        <div class="result-display" id="res_val">SCANNING</div>
        <div id="confidence">Tin cậy: --</div>
    </div>
</div>

<script>
    // Cấu hình API và Proxy
    const API_URL = "https://lc799.onrender.com/api/taixiu?key=docrackhihi";
    const PROXY = "https://api.allorigins.win/get?url=";

    let lastP = "";

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'vi-VN';
        window.speechSynthesis.speak(msg);
    }

    async function updateRobot() {
        try {
            const r = await fetch(`${PROXY}${encodeURIComponent(API_URL)}&t=${Date.now()}`);
            const j = await r.json();
            const d = JSON.parse(j.contents);

            if (d && d.Phien_nay) {
                document.getElementById("phien_id").innerText = "Phiên: #" + d.Phien_nay;
                document.getElementById("confidence").innerText = "Độ tin cậy: " + d.Dotincay;

                if (d.Phien_nay !== lastP) {
                    lastP = d.Phien_nay;
                    const rect = document.getElementById("mainRect");
                    const val = document.getElementById("res_val");

                    rect.classList.remove("mode-tai", "mode-xiu");

                    const pred = d.Dudoan.toUpperCase();
                    if (pred.includes("TAI") || pred.includes("TÀI")) {
                        rect.classList.add("mode-tai");
                        val.innerText = "CƯỢC TÀI";
                        speak("Tài");
                    } else {
                        rect.classList.add("mode-xiu");
                        val.innerText = "CƯỢC XỈU";
                        speak("Xỉu");
                    }
                }
            }
        } catch (e) {
            console.log("Reconnecting...");
        }
    }

    // Xử lý kéo thả Robot
    const tool = document.getElementById("moveTool");
    let isDown = false, offset = [0, 0];

    const start = (e) => {
        isDown = true;
        let ev = e.type.includes('touch') ? e.touches[0] : e;
        offset = [tool.offsetLeft - ev.clientX, tool.offsetTop - ev.clientY];
    };

    const move = (e) => {
        if (!isDown) return;
        let ev = e.type.includes('touch') ? e.touches[0] : e;
        tool.style.left = (ev.clientX + offset[0]) + 'px';
        tool.style.top = (ev.clientY + offset[1]) + 'px';
    };

    tool.addEventListener('mousedown', start);
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', () => isDown = false);
    tool.addEventListener('touchstart', start);
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('touchend', () => isDown = false);

    setInterval(updateRobot, 2000);
    updateRobot();
</script>

</body>
</html>
